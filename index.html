<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ことばノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #efefef;
    --surface:   #ffffff;
    --border:    #e0e0e0;
    --black:     #111111;
    --gray-dark: #444444;
    --gray-mid:  #888888;
    --gray-lt:   #bbbbbb;
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow:    0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--black);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ナビ ── */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; background: var(--bg); position: relative; z-index: 10;
  }
  .nav-logo {
    font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 400;
    color: var(--black); letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px;
  }
  .nav-logo svg { width: 28px; height: 28px; }
  .nav-menu {
    width: 36px; height: 36px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 5px;
    cursor: pointer; background: transparent; border: none; padding: 0; z-index: 201;
  }
  .nav-menu span {
    display: block; width: 20px; height: 1.5px;
    background: var(--black); border-radius: 2px; transition: all 0.25s;
  }
  .nav-menu.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-menu.open span:nth-child(2) { opacity: 0; }
  .nav-menu.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ── ドロワー（三本線メニュー） ── */
  .drawer-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    z-index: 100; backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -340px; width: 320px; height: 100vh;
    background: var(--surface); z-index: 200; transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,0.12);
  }
  .drawer.open { right: 0; }
  .drawer-header {
    padding: 24px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-title {
    font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 400;
    color: var(--black); letter-spacing: 0.06em;
  }
  .drawer-sub { font-size: 0.7rem; color: var(--gray-mid); margin-top: 3px; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* ゴミ箱アイテム */
  .trash-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: var(--bg); border-radius: var(--radius-md);
    margin-bottom: 8px;
  }
  .trash-item-word {
    flex: 1; font-family: 'Noto Serif JP', serif; font-size: 0.92rem;
    color: var(--black); line-height: 1.4;
  }
  .trash-item-date { font-size: 0.62rem; color: var(--gray-lt); margin-top: 2px; }
  .trash-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-restore {
    font-size: 0.7rem; padding: 5px 10px; border-radius: 100px;
    border: 1.5px solid var(--black); background: transparent; color: var(--black);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-restore:hover { background: var(--black); color: #fff; }
  .btn-perm-del {
    font-size: 0.7rem; padding: 5px 10px; border-radius: 100px;
    border: 1.5px solid var(--border); background: transparent; color: var(--gray-mid);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-perm-del:hover { border-color: #c0392b; color: #c0392b; }
  .trash-empty {
    text-align: center; padding: 40px 0; color: var(--gray-lt);
    font-size: 0.82rem; line-height: 2;
  }

  /* ── ヒーロー ── */
  .hero { text-align: center; padding: 52px 24px 40px; }
  .hero h1 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 700; color: var(--black);
    letter-spacing: -0.01em; line-height: 1.2; margin-bottom: 14px;
  }
  .hero p { font-size: 0.95rem; color: var(--gray-mid); font-weight: 300; }

  /* ── タブ ── */
  .tab-bar {
    display: flex; justify-content: center; margin: 0 auto 32px;
    background: var(--surface); border-radius: 100px; width: fit-content;
    padding: 5px; box-shadow: var(--shadow); gap: 2px;
  }
  .tab-btn {
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem; font-weight: 500;
    letter-spacing: 0.04em; padding: 8px 22px; border: none; border-radius: 100px;
    cursor: pointer; background: transparent; color: var(--gray-mid);
    transition: background 0.18s, color 0.18s;
  }
  .tab-btn.active { background: var(--black); color: var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.18); }

  /* ── メイン ── */
  .main-wrap { max-width: 680px; margin: 0 auto; padding: 0 20px 80px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── 入力カード ── */
  .input-card {
    background: var(--surface); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); padding: 24px 24px 16px; margin-bottom: 16px;
  }
  .input-card textarea {
    width: 100%; background: transparent; border: none; outline: none;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300; font-size: 1rem;
    color: var(--black); line-height: 1.8; resize: none; min-height: 110px;
    pointer-events: auto; -webkit-user-select: text; user-select: text;
  }
  .input-card textarea::placeholder { color: var(--gray-lt); font-size: 0.95rem; }

  /* 抽出プレビューバー */
  .extract-bar {
    display: none; align-items: center; gap: 8px;
    margin: 8px 0 12px; padding: 8px 12px;
    background: var(--bg); border-radius: var(--radius-sm);
  }
  .extract-bar.show { display: flex; }
  .extract-bar-label { font-size: 0.65rem; color: var(--gray-mid); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .extract-bar-word { font-family: 'Noto Serif JP', serif; font-size: 0.92rem; color: var(--black); }

  .card-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--border); margin-top: 4px;
  }
  .word-input-wrap input {
    background: var(--bg); border: none; border-radius: var(--radius-sm);
    padding: 6px 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem;
    color: var(--black); outline: none; width: 180px; transition: box-shadow 0.15s;
    pointer-events: auto; -webkit-user-select: text; user-select: text;
  }
  .word-input-wrap input:focus { box-shadow: 0 0 0 2px rgba(0,0,0,0.12); }
  .word-input-wrap input::placeholder { color: var(--gray-lt); }

  .btn-send {
    width: 42px; height: 42px; border-radius: 50%; background: var(--black); border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s, transform 0.1s; box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .btn-send:hover { background: var(--gray-dark); }
  .btn-send:active { transform: scale(0.94); }
  .btn-send svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .toast { display: none; text-align: center; font-size: 0.75rem; color: var(--gray-dark); padding: 8px 0; }

  /* ── 検索バー ── */
  .search-card {
    background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow);
    padding: 12px 20px; display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .search-card svg { width: 16px; height: 16px; stroke: var(--gray-lt); flex-shrink: 0; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .search-card input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; color: var(--black); font-weight: 300;
  }
  .search-card input::placeholder { color: var(--gray-lt); }
  .count-badge { display: none; }

  /* ── 表示切替 ── */
  .view-toggle { display: flex; gap: 8px; margin-bottom: 16px; justify-content: flex-end; }
  .view-btn {
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.72rem; font-weight: 500;
    padding: 6px 14px; border-radius: 100px; border: 1.5px solid var(--border);
    background: transparent; color: var(--gray-mid); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  .view-btn.active { background: var(--black); border-color: var(--black); color: #fff; }

  /* ── 通常カード ── */
  .cards-list { display: flex; flex-direction: column; gap: 8px; }
  .word-card {
    background: var(--surface); border-radius: var(--radius-md); box-shadow: var(--shadow);
    padding: 18px 20px; display: grid; grid-template-columns: 1fr auto; gap: 8px 16px; transition: box-shadow 0.15s;
  }
  .word-card:hover { box-shadow: var(--shadow-lg); }
  .card-word { font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 400; color: var(--black); line-height: 1.4; grid-column: 1; grid-row: 1; }
  .card-meaning { font-size: 0.8rem; font-weight: 300; color: var(--gray-dark); line-height: 1.75; white-space: pre-wrap; word-break: break-all; grid-column: 1; grid-row: 2; margin-top: 2px; }
  .card-date { font-size: 0.62rem; color: var(--gray-lt); letter-spacing: 0.04em; grid-column: 1; grid-row: 3; margin-top: 8px; }
  .card-del { grid-column: 2; grid-row: 1; background: transparent; border: none; color: var(--border); font-size: 0.85rem; cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; align-self: start; }
  .card-del:hover { color: var(--gray-dark); }

  /* ── フラッシュカード ── */
  .flash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .flash-grid { grid-template-columns: 1fr; } }
  .flash-scene { perspective: 900px; cursor: pointer; }
  .flash-inner { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1); }

  /* 表と裏で高さを揃えるため、両面をgridで重ねる */
  .flash-inner { display: grid; }
  .flash-front, .flash-back {
    grid-area: 1/1; border-radius: var(--radius-md);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 20px 16px; box-shadow: var(--shadow);
  }
  .flash-scene.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-front { background: var(--surface); flex-direction: column; gap: 8px; min-height: 100px; }
  .flash-front-word { font-family: 'Noto Serif JP', serif; font-size: 1.05rem; font-weight: 400; color: var(--black); text-align: center; line-height: 1.4; }
  .flash-hint { font-size: 0.6rem; color: var(--gray-lt); letter-spacing: 0.1em; }
  .flash-back { background: var(--black); transform: rotateY(180deg); flex-direction: column; align-items: flex-start; justify-content: flex-start; }
  .flash-back-word { font-family: 'Noto Serif JP', serif; font-size: 0.78rem; font-weight: 400; color: rgba(255,255,255,0.5); margin-bottom: 8px; flex-shrink: 0; }
  .flash-back-meaning { font-size: 0.75rem; font-weight: 300; color: rgba(255,255,255,0.85); line-height: 1.75; white-space: pre-wrap; word-break: break-all; }

  /* ── 空状態 ── */
  .empty-state { text-align: center; padding: 56px 0; color: var(--gray-lt); font-size: 0.82rem; line-height: 2.2; }
  .empty-icon { font-size: 2.2rem; margin-bottom: 8px; }

  @media (max-width: 500px) { .hero h1 { font-size: 1.8rem; } nav { padding: 14px 18px; } }
</style>
</head>
<body>

<!-- ドロワーオーバーレイ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- ドロワー本体（ゴミ箱） -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title">ゴミ箱</div>
      <div class="drawer-sub">削除した単語を復元または完全削除できます</div>
    </div>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- ナビ -->
<nav>
  <div class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none">
      <rect x="4" y="4" width="20" height="20" rx="5" stroke="#111" stroke-width="1.5"/>
      <line x1="9" y1="10" x2="19" y2="10" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="14" x2="19" y2="14" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="18" x2="14" y2="18" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    ことばノート
  </div>
  <button class="nav-menu" id="nav-menu-btn" onclick="toggleDrawer()" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ヒーロー -->
<div class="hero">
  <h1>書き留める。<br>忘れない。</h1>
  <p>気になった言葉を、自分だけの辞書に。</p>
</div>

<!-- タブ -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('record')">記録する</button>
  <button class="tab-btn" onclick="switchTab('list')">一覧 <span id="tab-count"></span></button>
</div>

<!-- メイン -->
<div class="main-wrap">

  <!-- 記録タブ -->
  <div class="section active" id="sec-record">
    <div class="input-card">
      <textarea id="inp-meaning"
        placeholder="ここに調べた内容を入力…"
        oninput="onMeaningInput()"></textarea>

      <div class="extract-bar" id="extract-bar">
        <span class="extract-bar-label">単語</span>
        <span class="extract-bar-word" id="preview-word"></span>
      </div>

      <div class="card-toolbar">
        <div class="word-input-wrap">
          <input type="text" id="inp-word" placeholder="単語（自動入力）" maxlength="100">
        </div>
        <button class="btn-send" onclick="saveEntry()" title="保存する">
          <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
    <p class="toast" id="toast"></p>
  </div>

  <!-- 一覧タブ -->
  <div class="section" id="sec-list">
    <div class="search-card">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="inp-search" placeholder="単語を検索…" oninput="renderCards()">
      <span class="count-badge" id="count-badge"></span>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-view-list"  onclick="setView('list')">一覧</button>
      <button class="view-btn"        id="btn-view-flash" onclick="setView('flash')">テスト</button>
    </div>
    <div id="cards-container"></div>
  </div>

</div>

<script>
  const COOKIE_KEY       = 'kotoba_entries';
  const COOKIE_TRASH_KEY = 'kotoba_trash';
  const MAX_ENTRIES = 50;
  const MAX_TRASH   = 50;
  let viewMode = 'list';

  /* ── Cookie ── */
  function saveCookie(key, data) {
    const json = encodeURIComponent(JSON.stringify(data));
    const exp  = new Date(); exp.setFullYear(exp.getFullYear() + 1);
    document.cookie = `${key}=${json}; expires=${exp.toUTCString()}; path=/; SameSite=Lax`;
  }
  function loadCookie(key) {
    const m = document.cookie.split('; ').find(r => r.startsWith(key + '='));
    if (!m) return [];
    try { return JSON.parse(decodeURIComponent(m.split('=').slice(1).join('='))); }
    catch { return []; }
  }

  let entries = loadCookie(COOKIE_KEY);
  let trash   = loadCookie(COOKIE_TRASH_KEY);

  /* ── ドロワー ── */
  function toggleDrawer() {
    const drawer  = document.getElementById('drawer');
    const overlay = document.getElementById('drawer-overlay');
    const btn     = document.getElementById('nav-menu-btn');
    const isOpen  = drawer.classList.contains('open');
    if (isOpen) {
      closeDrawer();
    } else {
      drawer.classList.add('open');
      overlay.classList.add('open');
      btn.classList.add('open');
      renderTrash();
    }
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
    document.getElementById('nav-menu-btn').classList.remove('open');
  }

  /* ── ゴミ箱描画 ── */
  function renderTrash() {
    const body = document.getElementById('drawer-body');
    if (trash.length === 0) {
      body.innerHTML = '<div class="trash-empty">🗑️<br>ゴミ箱は空です</div>';
      return;
    }
    body.innerHTML = trash.map(e => `
      <div class="trash-item" id="trash-${e.id}">
        <div class="trash-item-word">
          ${esc(e.word)}
          <div class="trash-item-date">${e.date} に削除</div>
        </div>
        <div class="trash-actions">
          <button class="btn-restore"   onclick="restoreEntry(${e.id})">復元</button>
          <button class="btn-perm-del"  onclick="permDelete(${e.id})">削除</button>
        </div>
      </div>
    `).join('');
  }

  /* ── 復元 ── */
  function restoreEntry(id) {
    const item = trash.find(e => e.id === id);
    if (!item) return;
    if (entries.length >= MAX_ENTRIES) { alert(`単語リストが上限（${MAX_ENTRIES}件）に達しています`); return; }
    trash = trash.filter(e => e.id !== id);
    entries.unshift(item);
    saveCookie(COOKIE_KEY,       entries);
    saveCookie(COOKIE_TRASH_KEY, trash);
    updateTabCount();
    renderTrash();
    if (document.getElementById('sec-list').classList.contains('active')) renderCards();
  }

  /* ── 完全削除 ── */
  function permDelete(id) {
    trash = trash.filter(e => e.id !== id);
    saveCookie(COOKIE_TRASH_KEY, trash);
    renderTrash();
  }

  /* ── タブ ── */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0) === (tab === 'record'));
    });
    document.getElementById('sec-record').classList.toggle('active', tab === 'record');
    document.getElementById('sec-list').classList.toggle('active',   tab === 'list');
    if (tab === 'list') renderCards();
  }

  /* ── 表示モード ── */
  function setView(mode) {
    viewMode = mode;
    document.getElementById('btn-view-list').classList.toggle('active',  mode === 'list');
    document.getElementById('btn-view-flash').classList.toggle('active', mode === 'flash');
    renderCards();
  }

  /* ── 単語自動抽出 ── */
  function extractWord(text) {
    const firstLine = text.split('\n')[0].trim();
    if (!firstLine) return '';
    if (/^(意味|例文|用例|解説|補足)[：:]/.test(firstLine)) return '';
    if (firstLine.length > 50) return '';
    return firstLine;
  }
  function onMeaningInput() {
    const word    = extractWord(document.getElementById('inp-meaning').value);
    const wordEl  = document.getElementById('inp-word');
    const bar     = document.getElementById('extract-bar');
    const preview = document.getElementById('preview-word');
    if (word) {
      wordEl.value = word;
      preview.textContent = word;
      bar.classList.add('show');
    } else {
      bar.classList.remove('show');
    }
  }

  /* ── 保存 ── */
  function saveEntry() {
    const wordEl    = document.getElementById('inp-word');
    const meaningEl = document.getElementById('inp-meaning');
    const word    = wordEl.value.trim();
    const meaning = meaningEl.value.trim();
    if (!word && !meaning) { showToast('内容を入力してください', false); return; }
    if (!word) { showToast('単語欄に入力してください', false); return; }
    if (entries.length >= MAX_ENTRIES) { showToast(`上限（${MAX_ENTRIES}件）に達しています`, false); return; }

    entries.unshift({
      id: Date.now(), word, meaning,
      date: new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' })
    });
    saveCookie(COOKIE_KEY, entries);
    meaningEl.value = '';
    wordEl.value    = '';
    document.getElementById('extract-bar').classList.remove('show');
    meaningEl.focus();
    updateTabCount();
    showToast('「' + word + '」を保存しました', true);
  }

  /* ── 削除（ゴミ箱へ移動） ── */
  function deleteEntry(id) {
    const item = entries.find(e => e.id === id);
    if (!item) return;
    entries = entries.filter(e => e.id !== id);
    // ゴミ箱に追加（上限超えたら古いものを捨てる）
    trash.unshift({ ...item, date: new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' }) });
    if (trash.length > MAX_TRASH) trash = trash.slice(0, MAX_TRASH);
    saveCookie(COOKIE_KEY,       entries);
    saveCookie(COOKIE_TRASH_KEY, trash);
    updateTabCount();
    renderCards();
  }

  /* ── フラッシュカードめくり ── */
  function toggleFlip(el) { el.classList.toggle('flipped'); }

  /* ── 一覧描画 ── */
  function renderCards() {
    const q         = document.getElementById('inp-search').value.trim().toLowerCase();
    const container = document.getElementById('cards-container');
    const filtered  = q
      ? entries.filter(e => e.word.toLowerCase().includes(q) || e.meaning.toLowerCase().includes(q))
      : entries;

    document.getElementById('count-badge').textContent =
      entries.length > 0 ? `${filtered.length} / ${entries.length} 語` : '';

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📖</div>
        ${entries.length === 0 ? '記録がありません<br>気になった言葉を書き留めてみましょう' : '該当する記録がありません'}
      </div>`;
      return;
    }

    if (viewMode === 'flash') {
      container.innerHTML = `<div class="flash-grid">${
        filtered.map(e => `
          <div class="flash-scene" onclick="toggleFlip(this)">
            <div class="flash-inner">
              <div class="flash-front">
                <div class="flash-front-word">${esc(e.word)}</div>
                <div class="flash-hint">タップして確認</div>
              </div>
              <div class="flash-back">
                <div class="flash-back-word">${esc(e.word)}</div>
                <div class="flash-back-meaning">${esc(e.meaning || '（メモなし）')}</div>
              </div>
            </div>
          </div>
        `).join('')
      }</div>`;
    } else {
      container.innerHTML = `<div class="cards-list">${
        filtered.map(e => `
          <div class="word-card">
            <div class="card-word">${esc(e.word)}</div>
            <button class="card-del" onclick="deleteEntry(${e.id})" title="削除">✕</button>
            <div class="card-meaning">${esc(e.meaning || '（メモなし）')}</div>
            <div class="card-date">${e.date}</div>
          </div>
        `).join('')
      }</div>`;
    }
  }

  /* ── タブカウント ── */
  function updateTabCount() {
    const n = entries.length;
    document.getElementById('tab-count').textContent = n > 0 ? `(${n})` : '';
  }

  /* ── トースト ── */
  function showToast(msg, ok) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    t.style.color = ok ? '#555' : '#c0392b';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.display = 'none'; }, 2800);
  }

  /* ── XSS ── */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  updateTabCount();
</script>
</body>
</html>
